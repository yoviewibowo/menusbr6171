<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Peta Sebaran Usaha Pontianak</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
}

.panel{
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
width:260px;
}

input,select{
width:100%;
margin-top:5px;
margin-bottom:10px;
padding:5px;
}

button{
width:100%;
padding:6px;
}

</style>

</head>

<body>

<div class="panel">

<b>Peta Usaha Pontianak</b>

<input type="text" id="searchBox" placeholder="Cari nama usaha">

<select id="filterKec">
<option value="">Semua Kecamatan</option>
</select>

<button onclick="toggleHeatmap()">Toggle Heatmap</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>

var map = L.map('map').setView([-0.02,109.34],12)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

var markers = L.markerClusterGroup()

var heatLayer
var heatData=[]

var usahaData=[]

function getColor(skala){

if(skala=="Mikro") return "green"
if(skala=="Kecil") return "blue"
if(skala=="Menengah") return "orange"
if(skala=="Besar") return "red"

return "gray"

}

function loadData(data){

markers.clearLayers()
heatData=[]

data.forEach(u=>{

if(!u.lat || !u.lon) return

var marker = L.circleMarker(
[u.lat,u.lon],
{
radius:6,
color:getColor(u.skala)
}
)

var popup=`
<b>${u.nama_usaha}</b><br>
${u.kegiatan}<br>
Skala: ${u.skala}<br>
Kelurahan: ${u.desa}<br>
Kecamatan: ${u.kecamatan}
`

marker.bindPopup(popup)

markers.addLayer(marker)

heatData.push([u.lat,u.lon,0.5])

})

map.addLayer(markers)

heatLayer = L.heatLayer(heatData,{
radius:25
})

}

function populateKecamatan(data){

var kecSet = new Set()

data.forEach(d=>{
kecSet.add(d.kecamatan)
})

var select=document.getElementById("filterKec")

kecSet.forEach(k=>{
var opt=document.createElement("option")
opt.value=k
opt.text=k
select.appendChild(opt)
})

}

function filterData(){

var kec=document.getElementById("filterKec").value
var search=document.getElementById("searchBox").value.toLowerCase()

var filtered=usahaData.filter(u=>{

var cocok=true

if(kec && u.kecamatan!=kec)
cocok=false

if(search && !u.nama_usaha.toLowerCase().includes(search))
cocok=false

return cocok

})

loadData(filtered)

}

document.getElementById("filterKec")
.addEventListener("change",filterData)

document.getElementById("searchBox")
.addEventListener("keyup",filterData)

function toggleHeatmap(){

if(map.hasLayer(heatLayer))
map.removeLayer(heatLayer)
else
map.addLayer(heatLayer)

}

fetch("data_usaha_sbr_pontianak.json")
.then(res=>res.json())
.then(data=>{

usahaData=data

populateKecamatan(data)

loadData(data)

})

</script>

</body>
</html>
